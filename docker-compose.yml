services:
  mysql:
    image: mysql:8.4
    container_name: feelpick-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feelpick
      MYSQL_USER: feelpick
      MYSQL_PASSWORD: feelpick
    ports:
      - '3307:3306'
    volumes:
      - feelpick-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-proot',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    # 빌드 컨텍스트는 레포 루트, Dockerfile은 백엔드 워크스페이스 것.
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: feelpick-backend
    # Docker Desktop 켤 때 자동 시작 안 함 (로컬 개발은 npm run dev 사용). 필요 시 docker compose up -d backend
    restart: 'no'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: '*'
      # 컨테이너 네트워크 안에서는 서비스명(mysql) + 내부 포트(3306)로 접속.
      DATABASE_URL: 'mysql://root:root@mysql:3306/feelpick'
      JWT_SECRET: 'change-me-in-production-use-openssl-rand-hex-32'
      JWT_EXPIRES_IN: '1d'
    ports:
      - '3000:3000'
    # 앱 시작 전 마이그레이션 적용 (prisma CLI가 운영 의존성에 포함됨).
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: feelpick-web
    # Docker Desktop 켤 때 자동 시작 안 함 (로컬 개발은 npm run dev 사용). 필요 시 docker compose up -d web
    restart: 'no'
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: '0.0.0.0' # 컨테이너 밖에서 접근 가능하게 모든 인터페이스 바인딩
      # 서버 컴포넌트가 컨테이너 네트워크에서 백엔드(backend)를 호출.
      API_URL: 'http://backend:3000'
    ports:
      - '3001:3001'

volumes:
  feelpick-mysql-data:
